services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: patient-booking-client
    ports:
      - "5173:80"
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: patient-booking-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CLIENT_URL=http://localhost:5173
      - JWT_SECRET=change-this-in-production
      - JWT_EXPIRES_IN=7d
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=patient_booking
      - AI_SERVICE_URL=http://ai-service:5001
    depends_on:
      - mongo
      - ai-service

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: patient-booking-ai-service
    ports:
      - "5001:5001"
    environment:
      - AI_PORT=5001
      - OPENAI_MODEL=gpt-4o-mini
      - CHROMA_URL=http://chroma:8000
      - CHROMA_COLLECTION=patient-booking-knowledge
    depends_on:
      - chroma

  mongo:
    image: mongo:7
    container_name: patient-booking-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: patient-booking-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000

volumes:
  mongo_data:
  chroma_data:
